<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FireCheck — Team Fire Drill App</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#090909;font-family:'Syne',sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script>
// ── HARDCODED CONFIG ──────────────────────────────────────────────────────────
const BIN_ID  = "69d4529936566621a8867f2e";
const API_KEY = "$2a$10$bIAm8zuPXIaTWlFc89g7TetTMExFEZ/XgsWRoMSJYDx.h8l87gE2S";
const APP_URL = "https://mesutgmail.github.io/firecheck";

// ── HELPERS ───────────────────────────────────────────────────────────────────
const LS={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
function initials(n){return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function timeAgo(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<10)return"just now";if(d<60)return d+"s ago";
  if(d<3600)return Math.floor(d/60)+"m ago";return Math.floor(d/3600)+"h ago";
}
function fmtPhone(raw){
  if(!raw)return"";
  const d=raw.replace(/\D/g,"");
  if(d.length===10)return"+1"+d;
  if(d.length===11&&d[0]==="1")return"+"+d;
  if(raw.startsWith("+"))return raw;
  return"+"+d;
}
function fmtDate(ts){
  if(!ts)return"—";
  return new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"});
}
function hashPin(pin){let h=0;for(let i=0;i<pin.length;i++)h=(Math.imul(31,h)+pin.charCodeAt(i))|0;return h.toString(36);}

// get ?name= from URL
function getUrlName(){
  try{
    const p=new URLSearchParams(window.location.search);
    return p.get("name")||"";
  }catch(e){return"";}
}

const STATUS_META={
  safe:   {label:"Safe & Outside", icon:"✅",color:"#22c55e",bg:"rgba(34,197,94,0.12)",  border:"rgba(34,197,94,0.3)"},
  away:   {label:"Evacuating Now", icon:"🏃",color:"#f59e0b",bg:"rgba(245,158,11,0.12)", border:"rgba(245,158,11,0.3)"},
  out:    {label:"Not at Work",    icon:"🏠",color:"#3b82f6",bg:"rgba(59,130,246,0.12)", border:"rgba(59,130,246,0.3)"},
  nothere:{label:"Unknown",        icon:"❓",color:"#9ca3af",bg:"rgba(107,114,128,0.12)",border:"rgba(107,114,128,0.3)"},
  waiting:{label:"No Response Yet",icon:"⏳",color:"#4b5563",bg:"rgba(75,85,99,0.08)",  border:"rgba(75,85,99,0.2)"},
};
const SORT_ORDER={safe:0,away:1,out:2,nothere:3,waiting:4};

// ── DB ────────────────────────────────────────────────────────────────────────
async function dbRead(){
  try{
    const r=await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID+"/latest",{headers:{"X-Master-Key":API_KEY}});
    if(!r.ok)return null;
    return(await r.json()).record;
  }catch(e){return null;}
}
async function dbWrite(data){
  try{
    await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
      body:JSON.stringify({...data,updatedAt:Date.now()})
    });
  }catch(e){}
}

// ── SMS ───────────────────────────────────────────────────────────────────────
async function sendSMS(toNumbers,message,creds){
  const{accountSid,authToken,fromNumber}=creds;
  return Promise.allSettled(toNumbers.map(to=>
    fetch("https://api.twilio.com/2010-04-01/Accounts/"+accountSid+"/Messages.json",{
      method:"POST",
      headers:{"Authorization":"Basic "+btoa(accountSid+":"+authToken),"Content-Type":"application/x-www-form-urlencoded"},
      body:new URLSearchParams({To:to,From:fromNumber,Body:message}).toString(),
    }).then(r=>r.json())
  ));
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx;}
function playAlarm(){try{const c=getCtx();[0,0.55,1.1].forEach(off=>{[0,0.08,0.16].forEach(t=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=t===0.08?1200:880;o.type="square";g.gain.setValueAtTime(0,c.currentTime+off+t);g.gain.linearRampToValueAtTime(0.18,c.currentTime+off+t+0.01);g.gain.linearRampToValueAtTime(0,c.currentTime+off+t+0.07);o.start(c.currentTime+off+t);o.stop(c.currentTime+off+t+0.1);});})}catch(e){}}
function playPing(){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=1400;o.type="sine";g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.12,c.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);o.start(c.currentTime);o.stop(c.currentTime+0.5);}catch(e){}}
function playEnd(){try{const c=getCtx();[0,0.15,0.3].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=[523,659,784][i];o.type="sine";g.gain.setValueAtTime(0,c.currentTime+t);g.gain.linearRampToValueAtTime(0.12,c.currentTime+t+0.02);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.3);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.35);});}catch(e){}}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
const{useState,useEffect,useRef,useCallback}=React;

function Avatar({name,color,bg,size=40}){
  return React.createElement("div",{style:{width:size,height:size,borderRadius:"50%",background:bg,color,border:"2px solid "+color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:size*0.34,flexShrink:0,fontFamily:"'Space Mono',monospace"}},initials(name));
}

function App(){
  const urlName=getUrlName();

  // core state
  const[shared,setShared]=useState({members:[],phonebook:[],drillActive:false,drillStartedAt:null,pingedAt:{},pinHash:null,history:[]});
  const[me,setMe]=useState(()=>{
    const saved=LS.get("fc:me");
    if(urlName&&(!saved||saved.name!==urlName)) return null; // force re-join if URL name differs
    return saved;
  });
  const[nameInput,setNameInput]=useState(urlName||"");
  const[roleInput,setRoleInput]=useState("");
  const[phoneInput,setPhoneInput]=useState("");
  const[noteInput,setNoteInput]=useState("");

  // coordinator
  const[isCoord,setIsCoord]=useState(false);
  const[showSetPin,setShowSetPin]=useState(false);
  const[showUnlock,setShowUnlock]=useState(false);
  const[newPin,setNewPin]=useState("");
  const[confirmPin,setConfirmPin]=useState("");
  const[pinInput,setPinInput]=useState("");
  const[pinError,setPinError]=useState("");

  // tabs
  const[activeTab,setActiveTab]=useState("live"); // live | phonebook | history

  // phonebook editor
  const[pbName,setPbName]=useState("");
  const[pbRole,setPbRole]=useState("");
  const[pbPhone,setPbPhone]=useState("");

  // twilio
  const[showConfig,setShowConfig]=useState(false);
  const[twSid,setTwSid]=useState(()=>{const c=LS.get("fc:twilio");return c?.accountSid||"";});
  const[twToken,setTwToken]=useState(()=>{const c=LS.get("fc:twilio");return c?.authToken||"";});
  const[twFrom,setTwFrom]=useState(()=>{const c=LS.get("fc:twilio");return c?.fromNumber||"";});
  const[smsLog,setSmsLog]=useState([]);
  const[sendingCount,setSendingCount]=useState(0);

  // ui
  const[alertFlash,setAlertFlash]=useState(false);
  const[elapsed,setElapsed]=useState("00:00");
  const[toast,setToast]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[showEndConfirm,setShowEndConfirm]=useState(false);
  const[,forceRender]=useState(0);
  const prevDrillRef=useRef(false);
  const toastRef=useRef(null);
  const writingRef=useRef(false);

  const showToast=useCallback((msg)=>{
    setToast(msg);clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(null),3200);
  },[]);

  const readDb=useCallback(async()=>await dbRead(),[]);
  const writeDb=useCallback(async(data)=>{
    if(writingRef.current)return;
    writingRef.current=true;
    await dbWrite(data);
    writingRef.current=false;
  },[]);

  // ── POLL ────────────────────────────────────────────────────────────────
  useEffect(()=>{
    const poll=async()=>{
      setSyncing(true);
      const s=await readDb();
      setSyncing(false);
      if(!s)return;
      const wasActive=prevDrillRef.current;
      const isNow=s.drillActive;
      if(!wasActive&&isNow){setAlertFlash(true);playAlarm();setTimeout(()=>setAlertFlash(false),3000);}
      if(wasActive&&!isNow)playEnd();
      prevDrillRef.current=isNow;
      setShared({...s,history:s.history||[],phonebook:s.phonebook||[]});
    };
    poll();
    const id=setInterval(poll,4000);
    const tk=setInterval(()=>forceRender(n=>n+1),15000);
    return()=>{clearInterval(id);clearInterval(tk);};
  },[readDb]);

  // ── TIMER ────────────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!shared.drillActive||!shared.drillStartedAt){setElapsed("00:00");return;}
    const t=setInterval(()=>{
      const s=Math.floor((Date.now()-shared.drillStartedAt)/1000);
      setElapsed(String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"));
    },1000);
    return()=>clearInterval(t);
  },[shared.drillActive,shared.drillStartedAt]);

  // ── JOIN ─────────────────────────────────────────────────────────────────
  const join=async()=>{
    const name=nameInput.trim();
    if(!name){showToast("Please enter your name");return;}
    // check phonebook for existing phone
    const pb=(shared.phonebook||[]);
    const pbEntry=pb.find(p=>p.name.toLowerCase()===name.toLowerCase());
    const phone=phoneInput.trim()||pbEntry?.phone||"";
    const role=roleInput.trim()||pbEntry?.role||"Team Member";
    const user={name,role,phone,status:"waiting",note:"",ts:Date.now()};
    setMe(user);LS.set("fc:me",user);
    const s=await readDb();
    const cur=s?.members||[];
    const idx=cur.findIndex(m=>m.name===name);
    if(idx>=0)cur[idx]=user;else cur.unshift(user);
    const next={...s,members:cur,phonebook:s?.phonebook||[],history:s?.history||[]};
    setShared(next);await writeDb(next);
    showToast("Welcome, "+name+"! 👋");
  };

  // ── STATUS ────────────────────────────────────────────────────────────────
  const setStatus=useCallback(async(status)=>{
    if(!me)return;
    const updated={...me,status,ts:Date.now()};
    setMe(updated);LS.set("fc:me",updated);
    const s=await readDb();
    const cur=(s?.members||[]).map(m=>m.name===me.name?updated:m);
    const next={...s,members:cur};
    setShared(prev=>({...prev,members:cur}));
    await writeDb(next);
    showToast(STATUS_META[status].icon+" "+STATUS_META[status].label);
  },[me,readDb,writeDb,showToast]);

  const sendNote=useCallback(async()=>{
    if(!me)return;
    const updated={...me,note:noteInput.trim(),ts:Date.now()};
    setMe(updated);LS.set("fc:me",updated);
    const s=await readDb();
    const cur=(s?.members||[]).map(m=>m.name===me.name?updated:m);
    const next={...s,members:cur};
    setShared(prev=>({...prev,members:cur}));
    await writeDb(next);
    showToast("📝 Note sent");
  },[me,noteInput,readDb,writeDb,showToast]);

  // ── PIN ───────────────────────────────────────────────────────────────────
  const handleSetPin=async()=>{
    if(newPin.length<4){setPinError("PIN must be at least 4 digits");return;}
    if(newPin!==confirmPin){setPinError("PINs don't match");return;}
    const hash=hashPin(newPin);
    const s=await readDb();
    const next={...s,pinHash:hash};
    setShared(prev=>({...prev,pinHash:hash}));
    await writeDb(next);
    setIsCoord(true);setShowSetPin(false);setNewPin("");setConfirmPin("");setPinError("");
    showToast("🔐 PIN set! You are now the coordinator.");
  };
  const handleUnlock=()=>{
    if(hashPin(pinInput)===shared.pinHash){
      setIsCoord(true);setShowUnlock(false);setPinInput("");setPinError("");
      showToast("🔓 Coordinator access granted");
    }else{setPinError("Incorrect PIN");setPinInput("");}
  };

  // ── PHONEBOOK ─────────────────────────────────────────────────────────────
  const addToPb=async()=>{
    const name=pbName.trim();
    if(!name||!pbPhone.trim()){showToast("Name and phone required");return;}
    const entry={name,role:pbRole.trim()||"Team Member",phone:pbPhone.trim()};
    const s=await readDb();
    const pb=s?.phonebook||[];
    const idx=pb.findIndex(p=>p.name===name);
    if(idx>=0)pb[idx]=entry;else pb.push(entry);
    const next={...s,phonebook:pb};
    setShared(prev=>({...prev,phonebook:pb}));
    await writeDb(next);
    setPbName("");setPbRole("");setPbPhone("");
    showToast("✅ "+name+" added to phone book");
  };

  const removeFromPb=async(name)=>{
    const s=await readDb();
    const pb=(s?.phonebook||[]).filter(p=>p.name!==name);
    const next={...s,phonebook:pb};
    setShared(prev=>({...prev,phonebook:pb}));
    await writeDb(next);
    showToast("🗑️ Removed "+name);
  };

  // ── SMS ───────────────────────────────────────────────────────────────────
  const blastSMS=useCallback(async(targets,message)=>{
    if(!twSid||!twToken||!twFrom)return;
    const withPhone=targets.filter(m=>m.phone);
    if(!withPhone.length){showToast("⚠️ No phone numbers found");return;}
    setSendingCount(withPhone.length);
    const results=await sendSMS(withPhone.map(m=>fmtPhone(m.phone)),message,{accountSid:twSid,authToken:twToken,fromNumber:fmtPhone(twFrom)});
    setSendingCount(0);
    const log=withPhone.map((m,i)=>({ts:Date.now(),name:m.name,to:fmtPhone(m.phone),status:results[i].status==="fulfilled"&&!results[i].value?.error_code?"sent":"failed"}));
    setSmsLog(prev=>[...log,...prev].slice(0,50));
    const sent=log.filter(l=>l.status==="sent").length;
    const fail=log.filter(l=>l.status==="failed").length;
    showToast("📱 SMS: "+sent+" sent"+(fail?", "+fail+" failed":""));
  },[twSid,twToken,twFrom,showToast]);

  // ── DRILL ─────────────────────────────────────────────────────────────────
  const startDrill=async()=>{
    const now=Date.now();
    const s=await readDb();
    const pb=s?.phonebook||[];

    // build members from phonebook — everyone starts as "waiting"
    // keep existing members who are already in but reset their status
    const existingNames=(s?.members||[]).map(m=>m.name);
    const pbMembers=pb.map(p=>({
      name:p.name,role:p.role,phone:p.phone,
      status:"waiting",note:"",ts:now
    }));
    // merge: phonebook members + any existing members not in phonebook
    const extra=(s?.members||[]).filter(m=>!pb.find(p=>p.name===m.name)).map(m=>({...m,status:"waiting",note:"",ts:now}));
    const allMembers=[...pbMembers,...extra];

    prevDrillRef.current=false;
    const next={...s,members:allMembers,drillActive:true,drillStartedAt:now,pingedAt:{},history:s?.history||[]};
    setShared(next);await writeDb(next);
    setAlertFlash(true);playAlarm();setTimeout(()=>setAlertFlash(false),3000);

    // SMS everyone in phonebook with personalized link
    const smsTargets=pb.map(p=>({
      ...p,
      // personalized link with name pre-filled
      _msg:"🔥 FIRE DRILL STARTED\nTap to report your status now:\n"+APP_URL+"?name="+encodeURIComponent(p.name)+"\n\n— FireCheck"
    }));

    // send individually with personalized links
    if(twSid&&twToken&&twFrom){
      setSendingCount(smsTargets.length);
      const results=await Promise.allSettled(
        smsTargets.filter(p=>p.phone).map(p=>
          fetch("https://api.twilio.com/2010-04-01/Accounts/"+twSid+"/Messages.json",{
            method:"POST",
            headers:{"Authorization":"Basic "+btoa(twSid+":"+twToken),"Content-Type":"application/x-www-form-urlencoded"},
            body:new URLSearchParams({To:fmtPhone(p.phone),From:fmtPhone(twFrom),Body:p._msg}).toString(),
          }).then(r=>r.json())
        )
      );
      setSendingCount(0);
      const withPhone=smsTargets.filter(p=>p.phone);
      const log=withPhone.map((p,i)=>({ts:Date.now(),name:p.name,to:fmtPhone(p.phone),status:results[i].status==="fulfilled"&&!results[i].value?.error_code?"sent":"failed"}));
      setSmsLog(prev=>[...log,...prev].slice(0,50));
      const sent=log.filter(l=>l.status==="sent").length;
      showToast("🔔 Drill started! SMS sent to "+sent+" teammates");
    } else {
      showToast("🔔 Drill started! (Setup SMS to send alerts)");
    }
  };

  // ── END DRILL (with history save) ─────────────────────────────────────────
  const endDrill=async()=>{
    const s=await readDb();
    // save snapshot to history BEFORE ending
    const snapshot={
      id:Date.now(),
      startedAt:s?.drillStartedAt||Date.now(),
      endedAt:Date.now(),
      members:(s?.members||[]).map(m=>({...m})), // deep copy
      summary:{
        safe:(s?.members||[]).filter(m=>m.status==="safe").length,
        away:(s?.members||[]).filter(m=>m.status==="away").length,
        out:(s?.members||[]).filter(m=>m.status==="out").length,
        nothere:(s?.members||[]).filter(m=>m.status==="nothere").length,
        waiting:(s?.members||[]).filter(m=>m.status==="waiting").length,
        total:(s?.members||[]).length,
      }
    };
    const history=[snapshot,...(s?.history||[])].slice(0,10); // keep last 10 drills
    prevDrillRef.current=true;
    const next={...s,drillActive:false,drillStartedAt:null,history};
    setShared(next);await writeDb(next);
    playEnd();
    // send all-clear to phonebook
    await blastSMS(s?.phonebook||[],"✅ Fire drill ended. All clear! — FireCheck");
    setShowEndConfirm(false);
    showToast("✅ Drill ended & saved to history!");
  };

  const pingMember=async(member)=>{
    playPing();
    const s=await readDb();
    const pings={...(s?.pingedAt||{}),[member.name]:Date.now()};
    const next={...s,pingedAt:pings};
    setShared(prev=>({...prev,pingedAt:pings}));
    await writeDb(next);
    if(member.phone){
      const msg="📣 "+member.name+", the coordinator needs your fire drill status!\n"+APP_URL+"?name="+encodeURIComponent(member.name)+"\n\n— FireCheck";
      await sendSMS([fmtPhone(member.phone)],msg,{accountSid:twSid,authToken:twToken,fromNumber:fmtPhone(twFrom)});
    }
    showToast("📣 Pinged "+member.name);
  };

  // ── RENDER HELPERS ────────────────────────────────────────────────────────
  const stats=(shared.members||[]).reduce((a,m)=>{a[m.status]=(a[m.status]||0)+1;return a;},{});
  const sorted=[...(shared.members||[])].sort((a,b)=>(SORT_ORDER[a.status]??4)-(SORT_ORDER[b.status]??4));
  const twilioReady=!!(twSid&&twToken&&twFrom);
  const pinIsSet=!!shared.pinHash;
  const h=React.createElement;

  // ── MODALS ────────────────────────────────────────────────────────────────
  const modals=[];

  if(showSetPin) modals.push(
    h("div",{key:"sp",className:"overlay",onClick:e=>e.target===e.currentTarget&&setShowSetPin(false)},
      h("div",{className:"modal"},
        h("button",{className:"modal-close",onClick:()=>setShowSetPin(false)},"×"),
        h("h2",null,"🔐 Set Coordinator PIN"),
        h("p",null,"Only you will be able to start or end drills."),
        h("div",{className:"cfg-lbl",style:{marginBottom:6}},"CHOOSE A PIN (min 4 digits)"),
        h("input",{className:"pin-input",type:"password",inputMode:"numeric",maxLength:8,placeholder:"••••",value:newPin,onChange:e=>setNewPin(e.target.value.replace(/\D/g,"")),onKeyDown:e=>e.key==="Enter"&&document.getElementById("cp2").focus()}),
        h("div",{className:"cfg-lbl",style:{margin:"12px 0 6px"}},"CONFIRM PIN"),
        h("input",{id:"cp2",className:"pin-input",type:"password",inputMode:"numeric",maxLength:8,placeholder:"••••",value:confirmPin,onChange:e=>setConfirmPin(e.target.value.replace(/\D/g,"")),onKeyDown:e=>e.key==="Enter"&&handleSetPin()}),
        h("div",{className:"pin-error"},pinError),
        h("button",{className:"btn-primary",style:{width:"100%",marginTop:10},onClick:handleSetPin},"Set PIN & Become Coordinator"),
        h("div",{className:"modal-hint"},"⚠️ Write your PIN down — there is no forgot PIN option.")
      )
    )
  );

  if(showUnlock) modals.push(
    h("div",{key:"ul",className:"overlay",onClick:e=>e.target===e.currentTarget&&(setShowUnlock(false),setPinInput(""),setPinError(""))},
      h("div",{className:"modal"},
        h("button",{className:"modal-close",onClick:()=>{setShowUnlock(false);setPinInput("");setPinError("");}},"×"),
        h("h2",null,"🔓 Coordinator Login"),
        h("p",null,"Enter your coordinator PIN to unlock drill controls."),
        h("input",{className:"pin-input",type:"password",inputMode:"numeric",maxLength:8,placeholder:"••••",value:pinInput,onChange:e=>setPinInput(e.target.value.replace(/\D/g,"")),onKeyDown:e=>e.key==="Enter"&&handleUnlock(),autoFocus:true}),
        h("div",{className:"pin-error"},pinError),
        h("button",{className:"btn-primary",style:{width:"100%",marginTop:10},onClick:handleUnlock},"Unlock")
      )
    )
  );

  // end drill confirmation
  if(showEndConfirm) modals.push(
    h("div",{key:"ec",className:"overlay",onClick:e=>e.target===e.currentTarget&&setShowEndConfirm(false)},
      h("div",{className:"modal"},
        h("button",{className:"modal-close",onClick:()=>setShowEndConfirm(false)},"×"),
        h("h2",null,"✅ End Drill?"),
        h("p",null,"This will save the current drill results to history and send an all-clear SMS to all teammates."),
        h("div",{style:{background:"#0d0d0d",borderRadius:10,padding:"14px 16px",marginBottom:16}},
          h("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#444",marginBottom:10}},"CURRENT DRILL SNAPSHOT"),

          :h("button",{className:"badge "+(twilioReady?"green":"dim"),onClick:()=>setShowConfig(v=>!v)},twilioReady?[h("div",{key:"d",className:"live-dot"}),"SMS READY"]:"📱 SETUP SMS"),
        isCoord
          ?h("button",{className:"badge coord",onClick:()=>{setIsCoord(false);showToast("🔒 Locked");}},"🔒 Lock")

            :h("button",{className:"badge dim",onClick:()=>{setShowSetPin(true);setPinError("");}},"🔐 Setup Coordinator")
      )

    h("main",{className:"main"},

      // TWILIO CONFIG
      showConfig&&h("div",{className:"config-panel"},
        h("h3",null,"📱 Twilio SMS Setup"),
        h("p",null,"Only you need to set this up. Teammates never see this."),
        h("div",{className:"cfg-row"},
          h("div",{className:"cfg-field"},h("div",{className:"cfg-lbl"},"ACCOUNT SID"),h("input",{className:"inp",placeholder:"ACxxxxxxxx",value:twSid,onChange:e=>setTwSid(e.target.value),style:{width:"100%"}})),
          h("div",{className:"cfg-field"},h("div",{className:"cfg-lbl"},"AUTH TOKEN"),h("input",{className:"inp",type:"password",placeholder:"••••••••",value:twToken,onChange:e=>setTwToken(e.target.value),style:{width:"100%"}}))
        ),
        h("div",{className:"cfg-row",style:{gridTemplateColumns:"1fr auto"}},
          h("div",{className:"cfg-field"},h("div",{className:"cfg-lbl"},"TWILIO PHONE NUMBER"),h("input",{className:"inp",placeholder:"+18553583196",value:twFrom,onChange:e=>setTwFrom(e.target.value),style:{width:"100%"}})),
          h("div",{style:{display:"flex",alignItems:"flex-end"}},h("button",{className:"btn-primary",onClick:()=>{LS.set("fc:twilio",{accountSid:twSid,authToken:twToken,fromNumber:twFrom});setShowConfig(false);showToast("✅ Twilio saved");}},"Save"))
        )
      ),

      // MY STATUS CARD
      h("div",{className:"card"},
        h("div",{className:"lbl"},"// my status"),
        me&&h("div",{className:"user-row"},
          h(Avatar,{name:me.name,color:STATUS_META[me.status]?.color||"#555",bg:STATUS_META[me.status]?.bg||"#1a1a1a",size:44}),
          h("div",{className:"user-info"},
            h("h2",null,me.name,isCoord&&h("span",{style:{fontSize:11,color:"#fbbf24",marginLeft:8,fontFamily:"'Space Mono',monospace"}},"★ COORD")),
            h("p",null,me.role)
          ),
          h("button",{onClick:()=>{setMe(null);LS.set("fc:me",null);setNameInput("");},style:{marginLeft:"auto",background:"transparent",border:"1px solid #222",borderRadius:8,padding:"4px 10px",color:"#444",fontFamily:"'Space Mono',monospace",fontSize:10,cursor:"pointer"}},"edit")
        ),
        !me
          ?h("div",null,
            h("div",{className:"input-row"},
              h("input",{className:"inp",placeholder:"Your name…",value:nameInput,onChange:e=>setNameInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&join(),maxLength:30}),
              h("input",{className:"inp",placeholder:"Role / team…",value:roleInput,onChange:e=>setRoleInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&join(),maxLength:40,style:{maxWidth:180}})
            ),
            h("div",{className:"input-row"},
              h("input",{className:"inp",placeholder:"📱 Mobile number (optional if in phone book)…",value:phoneInput,onChange:e=>setPhoneInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&join(),maxLength:15,type:"tel"}),
              h("button",{className:"btn-primary",onClick:join},"Join Team")
            ),
            urlName&&h("div",{style:{fontSize:11,color:"#22c55e",fontFamily:"'Space Mono',monospace",marginTop:8}},"✅ Name pre-filled from SMS link")
          )
          :h("div",null,
            h("div",{className:"status-grid"},
              [{key:"safe",label:"I'm Safe & Outside",sub:"Evacuated, at muster point"},
               {key:"away",label:"Evacuating Now",sub:"Still making my way out"},
               {key:"out",label:"Not at Work Today",sub:"WFH, PTO, or off-site"},
               {key:"nothere",label:"Can't Respond",sub:"Unsure / phone issue"}
              ].map(({key,label,sub})=>{
                const m=STATUS_META[key],active=me.status===key;
                return h("button",{key,className:"s-btn"+(active?" active":""),style:active?{borderColor:m.color,background:m.bg}:{},onClick:()=>setStatus(key)},
                  h("span",{className:"s-icon"},m.icon),h("div",null,label,h("span",{className:"s-sub"},sub))
                );
              })
            ),
            h("div",{className:"note-row"},
              h("input",{className:"inp",placeholder:'Optional note… e.g. "At parking lot entrance"',value:noteInput,onChange:e=>setNoteInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&sendNote(),maxLength:80}),
              h("button",{className:"btn-primary",onClick:sendNote},"Send")
            )
          )
      ),

      // COORDINATOR PANEL
      isCoord&&h("div",{className:"coord-panel"},
        h("div",{className:"coord-panel-hdr"},
          h("h3",null,"🎛️ Drill Control ",h("span",{className:"coord-tag"},"COORDINATOR")),
          h("div",{className:"ctrl-btns"},
            h("button",{className:"cbtn start",onClick:startDrill},"🔔 Start Drill"),
            h("button",{className:"cbtn end",onClick:()=>setShowEndConfirm(true)},"✅ End Drill"),
            h("button",{className:"cbtn lock",onClick:()=>{setIsCoord(false);showToast("🔒 Locked");}},"🔒 Lock")
          )
        ),
        h("div",{className:"coord-hint"},
          "Start → personalized SMS sent to all in phone book (",
          h("strong",{style:{color:"#888"}},(shared.phonebook||[]).filter(p=>p.phone).length," contacts"),
          ") | End → confirmation screen protects against accidental taps"

      ),

      !isCoord&&h("div",{className:"locked-panel"},
        h("div",{className:"locked-info"},
          h("h3",null,"🔒 Drill Control"),
          h("p",null,pinIsSet?"Coordinator login required":"No coordinator set up yet")
        ),
        pinIsSet
          ?h("button",{className:"cbtn",onClick:()=>{setShowUnlock(true);setPinError("");}},"🔓 Coordinator Login")
          :h("button",{className:"cbtn start",onClick:()=>{setShowSetPin(true);setPinError("");}},"🔐 Become Coordinator")
      ),

      // TABS
      h("div",{className:"tabs"},
        [{id:"live",label:"🔴 Live Board"},
         {id:"phonebook",label:"📋 Phone Book"},
         {id:"history",label:"📁 Drill History"},
        ].map(({id,label})=>
          h("button",{key:id,className:"tab-btn"+(activeTab===id?" active":""),onClick:()=>setActiveTab(id)},label)
        )
      ),

      // ── LIVE BOARD ──────────────────────────────────────────────────────
      activeTab==="live"&&h("div",null,
        h("div",{className:"stats"},
          [{key:"safe",color:"#22c55e",label:"SAFE"},
           {key:"away",color:"#f59e0b",label:"EVACUATING"},
           {key:"out",color:"#3b82f6",label:"NOT IN"},
           {key:"waiting",color:"#4b5563",label:"UNKNOWN",extra:"nothere"}
          ].map(({key,color,label,extra})=>
            h("div",{key,className:"stat"},
              h("div",{className:"stat-n",style:{color}},(stats[key]||0)+(extra?stats[extra]||0:0)),
              h("div",{className:"stat-l"},label)
            )
          )
        ),
        h("div",{className:"team-hdr"},
          h("h3",null,"Team Status"),
          h("span",{className:"cnt-badge"},(shared.members||[]).length+" member"+((shared.members||[]).length!==1?"s":"")),
          h("span",{style:{marginLeft:"auto",fontFamily:"'Space Mono',monospace",fontSize:10,color:"#252525"}},"syncs every 4s")
        ),
        (shared.members||[]).length===0
          ?h("div",{className:"empty"},
            h("h3",null,"No responses yet"),
            h("p",null,"Start a drill to notify your team. They'll tap the SMS link to report their status.")
          )
          :sorted.map(member=>{
            const meta=STATUS_META[member.status]||STATUS_META.waiting;
            const recentPing=(shared.pingedAt||{})[member.name]&&(Date.now()-(shared.pingedAt||{})[member.name])<12000;
            const needsPing=isCoord&&(member.status==="waiting"||member.status==="nothere");
            return h("div",{key:member.name,className:"member",style:recentPing?{borderColor:"rgba(245,158,11,.4)",background:"rgba(245,158,11,.04)"}:{}},
              h(Avatar,{name:member.name,color:meta.color,bg:meta.bg,size:38}),
              h("div",{className:"m-info"},
                h("h4",null,member.name,me&&member.name===me.name&&h("span",{className:"you-tag"},"(you)")),
                h("p",null,member.role),
                member.note&&h("div",{className:"m-note"},'"',member.note,'"'),
                h("div",{className:"m-time"},timeAgo(member.ts))
              ),
              h("div",{className:"pill",style:{background:meta.bg,color:meta.color,border:"1px solid "+meta.border}},meta.icon," ",meta.label),
              needsPing&&h("button",{className:"ping-btn"+(recentPing?" pinged":""),onClick:()=>pingMember(member)},recentPing?"📣 SENT":"📣 PING")
            );
          }),
        smsLog.length>0&&h("div",{className:"sms-log",style:{marginTop:16}},
          h("h4",null,"📋 SMS Log ",h("span",{style:{fontWeight:400,fontSize:11,color:"#444"}},"— "+smsLog.length+" messages")),
          smsLog.slice(0,5).map((l,i)=>h("div",{key:i,className:"log-entry"},
            h("span",{className:"log-status "+l.status},l.status==="sent"?"✓ SENT":"✗ FAIL"),
            h("span",{className:"log-name"},l.name),
            h("span",{className:"log-num"},l.to),
            h("span",{className:"log-time"},timeAgo(l.ts))
          ))
        )
      ),

      // ── PHONE BOOK ──────────────────────────────────────────────────────
      activeTab==="phonebook"&&h("div",null,
        h("div",{className:"card"},
          h("div",{className:"lbl"},"// add teammate"),
          h("p",{style:{fontSize:12,color:"#555",marginBottom:16,lineHeight:1.6}},"Add your teammates here once. When a drill starts, they'll receive a personalized SMS with a link — no app setup needed from them."),
          h("div",{className:"input-row"},
            h("input",{className:"inp",placeholder:"Full name…",value:pbName,onChange:e=>setPbName(e.target.value),maxLength:30}),
            h("input",{className:"inp",placeholder:"Role…",value:pbRole,onChange:e=>setPbRole(e.target.value),maxLength:40,style:{maxWidth:160}})
          ),
          h("div",{className:"input-row"},
            h("input",{className:"inp",placeholder:"📱 Phone number…",value:pbPhone,onChange:e=>setPbPhone(e.target.value),maxLength:15,type:"tel",onKeyDown:e=>e.key==="Enter"&&addToPb()}),
            h("button",{className:"btn-primary",onClick:addToPb},"Add")
          )
        ),
        (shared.phonebook||[]).length===0
          ?h("div",{className:"empty"},h("h3",null,"Phone book is empty"),h("p",null,"Add your teammates above. Their numbers are saved permanently."))
          :(shared.phonebook||[]).map(p=>
            h("div",{key:p.name,className:"member"},
              h(Avatar,{name:p.name,color:"#6b7280",bg:"rgba(107,114,128,0.12)",size:38}),
              h("div",{className:"m-info"},
                h("h4",null,p.name),
                h("p",null,p.role),
                h("div",{className:"m-phone"},"📱 ",fmtPhone(p.phone))
              ),
              isCoord&&h("button",{onClick:()=>removeFromPb(p.name),style:{border:"1px solid #333",background:"transparent",color:"#555",borderRadius:8,padding:"5px 10px",fontFamily:"'Space Mono',monospace",fontSize:10,cursor:"pointer",flexShrink:0}},"Remove")
            )
          )
      ),

      // ── DRILL HISTORY ───────────────────────────────────────────────────
      activeTab==="history"&&h("div",null,
        (shared.history||[]).length===0
          ?h("div",{className:"empty"},h("h3",null,"No drill history yet"),h("p",null,"Completed drills will be saved here automatically when you end a drill."))
          :(shared.history||[]).map((drill,di)=>
            h("div",{key:drill.id,className:"card",style:{marginBottom:14}},
              h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}},
                h("div",null,
                  h("div",{style:{fontWeight:800,fontSize:15}},"Drill #"+(( shared.history||[]).length-di)),
                  h("div",{style:{fontSize:11,color:"#555",fontFamily:"'Space Mono',monospace",marginTop:3}},fmtDate(drill.startedAt)+" → "+fmtDate(drill.endedAt))
                ),
                h("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#444"}},
                  Math.floor((drill.endedAt-drill.startedAt)/60000)+"m "+Math.floor(((drill.endedAt-drill.startedAt)%60000)/1000)+"s"
                )
              ),
              h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}},
                [{label:"✅ Safe",val:drill.summary.safe,color:"#22c55e"},
                 {label:"🏃 Evac",val:drill.summary.away,color:"#f59e0b"},
                 {label:"🏠 Out",val:drill.summary.out,color:"#3b82f6"},
                 {label:"⏳ No resp",val:drill.summary.waiting+drill.summary.nothere,color:"#555"},
                ].map(({label,val,color})=>
                  h("div",{key:label,style:{background:"#0d0d0d",borderRadius:8,padding:"10px",textAlign:"center"}},
                    h("div",{style:{fontSize:20,fontWeight:800,color,fontFamily:"'Space Mono',monospace"}},val),
                    h("div",{style:{fontSize:10,color:"#444",marginTop:2}},label)
                  )
                )
              ),
              h("div",{style:{borderTop:"1px solid #1a1a1a",paddingTop:12}},
                h("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#333",marginBottom:8,letterSpacing:"0.1em"}},"MEMBER RESPONSES"),
                (drill.members||[]).sort((a,b)=>(SORT_ORDER[a.status]??4)-(SORT_ORDER[b.status]??4)).map(m=>{
                  const meta=STATUS_META[m.status]||STATUS_META.waiting;
                  return h("div",{key:m.name,style:{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid #111"}},
                    h(Avatar,{name:m.name,color:meta.color,bg:meta.bg,size:30}),
                    h("div",{style:{flex:1,minWidth:0}},
                      h("div",{style:{fontSize:13,fontWeight:700}},m.name),
                      m.note&&h("div",{style:{fontSize:11,color:"#555",fontStyle:"italic"}},'"',m.note,'"')
                    ),
                    h("div",{style:{display:"flex",alignItems:"center",gap:5,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,background:meta.bg,color:meta.color,border:"1px solid "+meta.border,whiteSpace:"nowrap",flexShrink:0}},meta.icon," ",meta.label)
                  );
                })
              )
            )
          )
      )
    ),

    h("div",{className:"toast"+(toast?" show":"")},toast)
  );
}

// ── STYLES ────────────────────────────────────────────────────────────────────
const style=document.createElement("style");
style.textContent=`
.root{min-height:100vh;background:#090909;color:#f0ede8;font-family:'Syne',sans-serif;padding-bottom:80px}

.input-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.status-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.s-btn{border:1.5px solid #222;background:#1a1a1a;border-radius:12px;padding:13px 15px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:11px;color:#f0ede8;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;text-align:left;width:100%}
.s-btn:hover{border-color:#444;transform:translateY(-1px)}.s-btn.active{transform:translateY(-1px)}
.s-icon{font-size:20px;flex-shrink:0}
.s-sub{display:block;font-size:11px;font-weight:400;color:#444;margin-top:2px}
.note-row{display:flex;gap:8px;margin-top:12px}
.coord-panel{background:#141414;border:1.5px solid rgba(251,191,36,.2);border-radius:16px;padding:20px 22px;margin-bottom:18px}
.coord-panel-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.coord-panel-hdr h3{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
.coord-tag{font-family:'Space Mono',monospace;font-size:10px;color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);border-radius:20px;padding:3px 10px;letter-spacing:.08em}
.coord-hint{font-size:11px;color:#333;font-family:'Space Mono',monospace;line-height:1.6}
.ctrl-btns{display:flex;gap:8px;flex-wrap:wrap}
.cbtn{border:1.5px solid #252525;background:#1a1a1a;color:#f0ede8;border-radius:10px;padding:9px 16px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}.cbtn:hover{border-color:#555}
.cbtn.start{background:#ff4d2e;border-color:#ff4d2e;color:#fff}.cbtn.start:hover{opacity:.85}
.cbtn.end{border-color:#22c55e;color:#22c55e}.cbtn.end:hover{background:rgba(34,197,94,.08)}
.cbtn.lock{border-color:#fbbf24;color:#fbbf24}.cbtn.lock:hover{background:rgba(251,191,36,.08)}
.locked-panel{background:#131313;border:1px solid #1e1e1e;border-radius:16px;padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.locked-info h3{font-size:14px;font-weight:700;color:#555;display:flex;align-items:center;gap:8px}
.locked-info p{font-size:12px;color:#333;margin-top:3px}
.tabs{display:flex;gap:4px;margin-bottom:18px;background:#0d0d0d;border-radius:12px;padding:4px}
.tab-btn{flex:1;border:none;background:transparent;color:#555;border-radius:9px;padding:9px 12px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn:hover{color:#888}
.tab-btn.active{background:#1a1a1a;color:#f0ede8;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat{background:#131313;border:1px solid #1e1e1e;border-radius:12px;padding:15px;text-align:center}
.stat-n{font-size:28px;font-weight:800;font-family:'Space Mono',monospace}
.stat-l{font-size:10px;color:#333;margin-top:3px;font-family:'Space Mono',monospace;letter-spacing:.08em}
.team-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.team-hdr h3{font-size:16px;font-weight:700}
.cnt-badge{font-family:'Space Mono',monospace;font-size:11px;color:#444;background:#1a1a1a;border:1px solid #222;border-radius:20px;padding:2px 10px}
.member{background:#131313;border:1px solid #1e1e1e;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.m-info{flex:1;min-width:0}.m-info h4{font-size:14px;font-weight:700}.m-info p{font-size:12px;color:#555;margin-top:2px}
.m-note{font-size:11px;color:#555;margin-top:4px;font-style:italic}
.m-time{font-family:'Space Mono',monospace;font-size:10px;color:#2a2a2a;margin-top:3px}
.m-phone{font-family:'Space Mono',monospace;font-size:10px;color:#2e2e2e;margin-top:2px}
.pill{display:flex;align-items:center;gap:5px;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.you-tag{font-size:10px;color:#3a3a3a;margin-left:5px;font-weight:400}
.ping-btn{border:1px solid #252525;background:transparent;color:#555;border-radius:8px;padding:5px 10px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .15s;margin-left:4px;flex-shrink:0}.ping-btn:hover{border-color:#ff4d2e;color:#ff4d2e}.ping-btn.pinged{border-color:#f59e0b;color:#f59e0b}
.empty{background:rgba(107,114,128,.04);border:1px dashed #1e1e1e;border-radius:12px;padding:40px;text-align:center;color:#333}
.empty h3{font-size:15px;color:#555;margin-bottom:6px}.empty p{font-size:13px;margin-top:4px}
.sms-log{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:12px;padding:16px}
.sms-log h4{font-size:13px;font-weight:700;margin-bottom:12px}
.log-entry{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #141414;font-size:11px}.log-entry:last-child{border-bottom:none}
.log-status{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.log-status.sent{color:#22c55e;background:rgba(34,197,94,.1)}.log-status.failed{color:#ef4444;background:rgba(239,68,68,.1)}
.log-name{font-weight:600;flex:1}.log-num{color:#333;font-family:'Space Mono',monospace}.log-time{color:#2a2a2a;font-family:'Space Mono',monospace;font-size:9px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9998;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:540px){.stats{grid-template-columns:repeat(2,1fr)}.status-grid{grid-template-columns:1fr}.coord-panel-hdr{flex-direction:column;align-items:flex-start}.cfg-row{grid-template-columns:1fr}.locked-panel{flex-direction:column;align-items:flex-start}.tabs{flex-direction:column}}
`;
document.head.appendChild(style);
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
