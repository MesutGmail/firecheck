<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#090909;font-family:'Syne',sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script>
const BIN_ID  = "69d4529936566621a8867f2e";
const API_KEY = "$2a$10$bIAm8zuPXIaTWlFc89g7TetTMExFEZ/XgsWRoMSJYDx.h8l87gE2S";
const APP_URL = "https://mesutgmail.github.io/firecheck";

const LS={get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};
function initials(n){return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function timeAgo(ts){const d=Math.floor((Date.now()-ts)/1000);if(d<10)return"just now";if(d<60)return d+"s ago";if(d<3600)return Math.floor(d/60)+"m ago";return Math.floor(d/3600)+"h ago";}
function fmtPhone(raw){if(!raw)return"";const d=raw.replace(/\D/g,"");if(d.length===10)return"+1"+d;if(d.length===11&&d[0]==="1")return"+"+d;if(raw.startsWith("+"))return raw;return"+"+d;}
function fmtDate(ts){if(!ts)return"—";return new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"2-digit",minute:"2-digit"});}
function hashPin(pin){let h=0;for(let i=0;i<pin.length;i++)h=(Math.imul(31,h)+pin.charCodeAt(i))|0;return h.toString(36);}
function getUrlName(){try{return new URLSearchParams(window.location.search).get("name")||"";}catch(e){return "";}}

const STATUS_META={
  safe:   {label:"Safe & Outside",icon:"✅",color:"#22c55e",bg:"rgba(34,197,94,0.12)",  border:"rgba(34,197,94,0.3)"},
  away:   {label:"Evacuating Now",icon:"🏃",color:"#f59e0b",bg:"rgba(245,158,11,0.12)", border:"rgba(245,158,11,0.3)"},
  out:    {label:"Not at Work",   icon:"🏠",color:"#3b82f6",bg:"rgba(59,130,246,0.12)", border:"rgba(59,130,246,0.3)"},
  nothere:{label:"Unknown",       icon:"❓",color:"#9ca3af",bg:"rgba(107,114,128,0.12)",border:"rgba(107,114,128,0.3)"},
  waiting:{label:"No Response",   icon:"⏳",color:"#4b5563",bg:"rgba(75,85,99,0.08)",  border:"rgba(75,85,99,0.2)"},
};
const SORT_ORDER={safe:0,away:1,out:2,nothere:3,waiting:4};

// access levels
const ACCESS={NONE:0,TEAMMATE:1,COORDINATOR:2,ADMIN:3};

async function dbRead(){try{const r=await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID+"/latest",{headers:{"X-Master-Key":API_KEY}});if(!r.ok)return null;return(await r.json()).record;}catch(e){return null;}}
async function dbWrite(data){try{await fetch("https://api.jsonbin.io/v3/b/"+BIN_ID,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify({...data,updatedAt:Date.now()})});}catch(e){}}
async function sendOneSMS(to,body,creds){return fetch("https://api.twilio.com/2010-04-01/Accounts/"+creds.sid+"/Messages.json",{method:"POST",headers:{"Authorization":"Basic "+btoa(creds.sid+":"+creds.token),"Content-Type":"application/x-www-form-urlencoded"},body:new URLSearchParams({To:to,From:creds.from,Body:body}).toString()}).then(r=>r.json());}

let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx;}
function playAlarm(){try{const c=getCtx();[0,0.55,1.1].forEach(off=>{[0,0.08,0.16].forEach(t=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=t===0.08?1200:880;o.type="square";g.gain.setValueAtTime(0,c.currentTime+off+t);g.gain.linearRampToValueAtTime(0.18,c.currentTime+off+t+0.01);g.gain.linearRampToValueAtTime(0,c.currentTime+off+t+0.07);o.start(c.currentTime+off+t);o.stop(c.currentTime+off+t+0.1);});})}catch(e){}}
function playPing(){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=1400;o.type="sine";g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.12,c.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);o.start(c.currentTime);o.stop(c.currentTime+0.5);}catch(e){}}
function playEnd(){try{const c=getCtx();[0,0.15,0.3].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=[523,659,784][i];o.type="sine";g.gain.setValueAtTime(0,c.currentTime+t);g.gain.linearRampToValueAtTime(0.12,c.currentTime+t+0.02);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.3);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.35);});}catch(e){}}

const{useState,useEffect,useRef,useCallback}=React;
function Avatar({name,color,bg,size=40}){return React.createElement("div",{style:{width:size,height:size,borderRadius:"50%",background:bg,color,border:"2px solid "+color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:size*0.34,flexShrink:0,fontFamily:"'Space Mono',monospace"}},initials(name));}

// ── LOCK SCREEN ───────────────────────────────────────────────────────────────
function LockScreen({shared,onUnlock,isFirstSetup}){
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[mode,setMode]=useState("enter"); // enter | setAdmin | setCoord
  const[newPin,setNewPin]=useState("");
  const[confirmPin,setConfirmPin]=useState("");
  const h=React.createElement;

  const tryUnlock=(p)=>{
    const hp=hashPin(p||pin);
    if(shared.adminPinHash&&hp===shared.adminPinHash){onUnlock(ACCESS.ADMIN);return;}
    if(shared.coordPinHash&&hp===shared.coordPinHash){onUnlock(ACCESS.COORDINATOR);return;}
    setErr("Incorrect PIN");setPin("");
  };

  // first time — no pins set yet
  if(isFirstSetup) return h("div",{className:"lock-screen"},
    h("div",{className:"lock-box"},
      h("div",{className:"lock-logo"},h("span",{className:"flame"},"🔥"),h("h1",null,"Fire",h("span",null,"Check"))),
      h("div",{className:"lock-title"},"Welcome to FireCheck"),
      h("p",{className:"lock-sub"},"Set up your Admin and Coordinator PINs to get started. These PINs protect access to the app."),
      mode==="enter"&&h("div",{className:"lock-actions"},
        h("button",{className:"lock-btn admin",onClick:()=>setMode("setAdmin")},"🔐 Set Admin PIN",h("span",null,"Manages phone book & app settings")),
        h("button",{className:"lock-btn coord",onClick:()=>setMode("setCoord")},"🎛️ Set Coordinator PIN",h("span",null,"Starts and ends drills"))
      ),
      (mode==="setAdmin"||mode==="setCoord")&&h("div",null,
        h("div",{className:"lock-pin-label"},mode==="setAdmin"?"🔐 SET ADMIN PIN":"🎛️ SET COORDINATOR PIN"),
        h("input",{className:"lock-pin-input",type:"password",inputMode:"numeric",maxLength:8,placeholder:"Choose PIN…",value:newPin,onChange:e=>{setNewPin(e.target.value.replace(/\D/g,""));setErr("");}}),
        h("div",{className:"lock-pin-label",style:{marginTop:12}},"CONFIRM PIN"),
        h("input",{className:"lock-pin-input",type:"password",inputMode:"numeric",maxLength:8,placeholder:"Confirm PIN…",value:confirmPin,onChange:e=>{setConfirmPin(e.target.value.replace(/\D/g,""));setErr("");},onKeyDown:e=>e.key==="Enter"&&(()=>{
          if(newPin.length<4){setErr("Min 4 digits");return;}
          if(newPin!==confirmPin){setErr("PINs don't match");return;}
          onUnlock(mode==="setAdmin"?ACCESS.ADMIN:ACCESS.COORDINATOR,newPin,mode==="setAdmin"?"admin":"coord");
        })()}),
        h("div",{className:"lock-error"},err),
        h("button",{className:"lock-btn-primary",onClick:()=>{
          if(newPin.length<4){setErr("Min 4 digits");return;}
          if(newPin!==confirmPin){setErr("PINs don't match");return;}
          onUnlock(mode==="setAdmin"?ACCESS.ADMIN:ACCESS.COORDINATOR,newPin,mode==="setAdmin"?"admin":"coord");
        }},"Save & Enter"),
        h("button",{className:"lock-back",onClick:()=>{setMode("enter");setNewPin("");setConfirmPin("");setErr("");}},"← Back")
      )
    )
  );

  // normal lock screen
  return h("div",{className:"lock-screen"},
    h("div",{className:"lock-box"},
      h("div",{className:"lock-logo"},h("span",{className:"flame"},"🔥"),h("h1",null,"Fire",h("span",null,"Check"))),
      h("div",{className:"lock-icon"},"🔒"),
      h("div",{className:"lock-title"},"Restricted Access"),
      h("p",{className:"lock-sub"},"Enter your Coordinator or Admin PIN to access the app."),
      h("div",{className:"lock-pin-label"},"ENTER PIN"),
      h("input",{className:"lock-pin-input",type:"password",inputMode:"numeric",maxLength:8,placeholder:"••••",value:pin,onChange:e=>{setPin(e.target.value.replace(/\D/g,""));setErr("");},onKeyDown:e=>e.key==="Enter"&&tryUnlock(),autoFocus:true}),
      h("div",{className:"lock-error"},err),
      h("button",{className:"lock-btn-primary",onClick:()=>tryUnlock()},"Unlock"),
      h("div",{className:"lock-hint"},"Only Coordinators and Admins can access this app.")
    )
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const urlName=getUrlName();
  const[shared,setShared]=useState(null); // null = loading
  const[accessLevel,setAccessLevel]=useState(ACCESS.NONE);
  const[me,setMe]=useState(()=>LS.get("fc:me"));
  const[nameInput,setNameInput]=useState(urlName||"");
  const[roleInput,setRoleInput]=useState("");
  const[phoneInput,setPhoneInput]=useState("");
  const[noteInput,setNoteInput]=useState("");
  const[modal,setModal]=useState(null);
  const[pinError,setPinError]=useState("");
  const[editTarget,setEditTarget]=useState(null);
  const[activeTab,setActiveTab]=useState("live");
  const[pbName,setPbName]=useState("");
  const[pbRole,setPbRole]=useState("");
  const[pbPhone,setPbPhone]=useState("");
  const[showConfig,setShowConfig]=useState(false);
  const[twSid,setTwSid]=useState(()=>{const c=LS.get("fc:twilio");return c?.accountSid||"";});
  const[twToken,setTwToken]=useState(()=>{const c=LS.get("fc:twilio");return c?.authToken||"";});
  const[twFrom,setTwFrom]=useState(()=>{const c=LS.get("fc:twilio");return c?.fromNumber||"";});
  const[smsLog,setSmsLog]=useState([]);
  const[sendingCount,setSendingCount]=useState(0);
  const[alertFlash,setAlertFlash]=useState(false);
  const[elapsed,setElapsed]=useState("00:00");
  const[toast,setToast]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[,forceRender]=useState(0);
  const prevDrillRef=useRef(false);
  const toastRef=useRef(null);
  const writingRef=useRef(false);

  const showToast=useCallback((msg)=>{setToast(msg);clearTimeout(toastRef.current);toastRef.current=setTimeout(()=>setToast(null),3200);},[]);
  const closeModal=useCallback(()=>{setModal(null);setPinError("");},[]);
  const isCoord=accessLevel>=ACCESS.COORDINATOR;
  const isAdmin=accessLevel>=ACCESS.ADMIN;

  // ── INITIAL LOAD ──────────────────────────────────────────────────────
  useEffect(()=>{
    dbRead().then(s=>{
      setShared({members:[],phonebook:[],history:[],pingedAt:{},...(s||{})});
    });
  },[]);

  // ── POLL ──────────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!shared||accessLevel===ACCESS.NONE)return;
    const poll=async()=>{
      setSyncing(true);const s=await dbRead();setSyncing(false);if(!s)return;
      const wasActive=prevDrillRef.current;const isNow=s.drillActive;
      if(!wasActive&&isNow){setAlertFlash(true);playAlarm();setTimeout(()=>setAlertFlash(false),3000);}
      if(wasActive&&!isNow)playEnd();
      prevDrillRef.current=isNow;
      setShared({members:[],phonebook:[],history:[],pingedAt:{},...s});
    };
    poll();const id=setInterval(poll,4000);const tk=setInterval(()=>forceRender(n=>n+1),15000);
    return()=>{clearInterval(id);clearInterval(tk);};
  },[shared&&accessLevel>0]);// eslint-disable-line

  useEffect(()=>{
    if(!shared?.drillActive||!shared?.drillStartedAt){setElapsed("00:00");return;}
    const t=setInterval(()=>{const s=Math.floor((Date.now()-shared.drillStartedAt)/1000);setElapsed(String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"));},1000);
    return()=>clearInterval(t);
  },[shared?.drillActive,shared?.drillStartedAt]);

  const writeDb=useCallback(async(data)=>{if(writingRef.current)return;writingRef.current=true;await dbWrite(data);writingRef.current=false;},[]);

  // ── UNLOCK / FIRST SETUP ──────────────────────────────────────────────
  const handleUnlock=useCallback(async(level,newPinVal,pinType)=>{
    if(newPinVal&&pinType){
      // First-time setup — save new PIN to DB
      const s=await dbRead();
      const patch=pinType==="admin"?{adminPinHash:hashPin(newPinVal)}:{coordPinHash:hashPin(newPinVal)};
      const next={members:[],phonebook:[],history:[],pingedAt:{},...(s||{}),...patch};
      setShared(next);await dbWrite(next);
      setAccessLevel(level);
      showToast(pinType==="admin"?"🔐 Admin PIN set!":"🎛️ Coordinator PIN set!");
    } else {
      setAccessLevel(level);
    }
  },[showToast]);

  // ── JOIN ──────────────────────────────────────────────────────────────
  const join=async()=>{
    const name=nameInput.trim();if(!name){showToast("Please enter your name");return;}
    const pb=shared?.phonebook||[];
    const pbEntry=pb.find(p=>p.name.toLowerCase()===name.toLowerCase());
    const phone=phoneInput.trim()||pbEntry?.phone||"";
    const role=roleInput.trim()||pbEntry?.role||"Team Member";
    const user={name,role,phone,status:"waiting",note:"",ts:Date.now()};
    setMe(user);LS.set("fc:me",user);
    const s=await dbRead();const cur=s?.members||[];
    const idx=cur.findIndex(m=>m.name===name);if(idx>=0)cur[idx]=user;else cur.unshift(user);
    const next={...s,members:cur};setShared(prev=>({...prev,members:cur}));await writeDb(next);
    showToast("Welcome, "+name+"! 👋");
  };

  const setStatus=useCallback(async(status)=>{
    if(!me)return;
    const updated={...me,status,ts:Date.now()};setMe(updated);LS.set("fc:me",updated);
    const s=await dbRead();const cur=(s?.members||[]).map(m=>m.name===me.name?updated:m);
    setShared(prev=>({...prev,members:cur}));await writeDb({...s,members:cur});
    showToast(STATUS_META[status].icon+" "+STATUS_META[status].label);
  },[me,writeDb,showToast]);

  const sendNote=useCallback(async()=>{
    if(!me)return;const updated={...me,note:noteInput.trim(),ts:Date.now()};setMe(updated);LS.set("fc:me",updated);
    const s=await dbRead();const cur=(s?.members||[]).map(m=>m.name===me.name?updated:m);
    setShared(prev=>({...prev,members:cur}));await writeDb({...s,members:cur});showToast("📝 Note sent");
  },[me,noteInput,writeDb,showToast]);

  // ── PIN CHANGE MODALS ─────────────────────────────────────────────────
  const handleChangePin=async(pin,type)=>{
    if(pin.length<4){setPinError("Min 4 digits");return;}
    const hash=hashPin(pin);const s=await dbRead();
    const patch=type==="admin"?{adminPinHash:hash}:{coordPinHash:hash};
    const next={...s,...patch};setShared(prev=>({...prev,...patch}));await writeDb(next);
    closeModal();showToast(type==="admin"?"🔐 Admin PIN updated":"🎛️ Coordinator PIN updated");
  };

  // ── PHONEBOOK ─────────────────────────────────────────────────────────
  const addToPb=async()=>{
    const name=pbName.trim();if(!name||!pbPhone.trim()){showToast("Name and phone required");return;}
    const entry={name,role:pbRole.trim()||"Team Member",phone:pbPhone.trim()};
    const s=await dbRead();const pb=s?.phonebook||[];
    const idx=pb.findIndex(p=>p.name===name);if(idx>=0)pb[idx]=entry;else pb.push(entry);
    const next={...s,phonebook:pb};setShared(prev=>({...prev,phonebook:pb}));await writeDb(next);
    setPbName("");setPbRole("");setPbPhone("");showToast("✅ "+name+" added");
  };
  const removeFromPb=async(name)=>{
    const s=await dbRead();const pb=(s?.phonebook||[]).filter(p=>p.name!==name);
    const next={...s,phonebook:pb};setShared(prev=>({...prev,phonebook:pb}));await writeDb(next);showToast("🗑️ Removed "+name);
  };
  const saveEdit=async()=>{
    if(!editTarget)return;
    const s=await dbRead();const pb=(s?.phonebook||[]).map(p=>p.name===editTarget._origName?{name:editTarget.name.trim(),role:editTarget.role.trim(),phone:editTarget.phone.trim()}:p);
    const next={...s,phonebook:pb};setShared(prev=>({...prev,phonebook:pb}));await writeDb(next);
    closeModal();setEditTarget(null);showToast("✅ "+editTarget.name+" updated");
  };

  // ── SMS ────────────────────────────────────────────────────────────────
  const creds=useCallback(()=>({sid:twSid,token:twToken,from:fmtPhone(twFrom)}),[twSid,twToken,twFrom]);
  const blastPersonalized=useCallback(async(targets)=>{
    if(!twSid||!twToken||!twFrom)return 0;
    const withPhone=targets.filter(p=>p.phone);if(!withPhone.length)return 0;
    setSendingCount(withPhone.length);
    const results=await Promise.allSettled(withPhone.map(p=>sendOneSMS(fmtPhone(p.phone),"🔥 FIRE DRILL STARTED\nTap to report your status:\n"+APP_URL+"?name="+encodeURIComponent(p.name)+"\n\n— FireCheck",creds())));
    setSendingCount(0);
    const log=withPhone.map((p,i)=>({ts:Date.now(),name:p.name,to:fmtPhone(p.phone),status:results[i].status==="fulfilled"&&!results[i].value?.error_code?"sent":"failed"}));
    setSmsLog(prev=>[...log,...prev].slice(0,50));
    return log.filter(l=>l.status==="sent").length;
  },[twSid,twToken,twFrom,creds]);

  const blastAllClear=useCallback(async(targets)=>{
    if(!twSid||!twToken||!twFrom)return;
    await Promise.allSettled(targets.filter(p=>p.phone).map(p=>sendOneSMS(fmtPhone(p.phone),"✅ Fire drill ended. All clear! — FireCheck",creds())));
  },[twSid,twToken,twFrom,creds]);

  // ── DRILL ─────────────────────────────────────────────────────────────
  const startDrill=async()=>{
    if(!isCoord){showToast("🔒 Coordinator access required");return;}
    const now=Date.now();const s=await dbRead();const pb=s?.phonebook||[];
    const pbMembers=pb.map(p=>({name:p.name,role:p.role,phone:p.phone,status:"waiting",note:"",ts:now}));
    const extra=(s?.members||[]).filter(m=>!pb.find(p=>p.name===m.name)).map(m=>({...m,status:"waiting",note:"",ts:now}));
    prevDrillRef.current=false;
    const next={...s,members:[...pbMembers,...extra],drillActive:true,drillStartedAt:now,pingedAt:{}};
    setShared(next);await writeDb(next);
    setAlertFlash(true);playAlarm();setTimeout(()=>setAlertFlash(false),3000);
    const sent=await blastPersonalized(pb);
    showToast("🔔 Drill started! SMS sent to "+sent+" teammates");
  };

  const confirmEndDrill=async()=>{
    if(!isCoord){showToast("🔒 Coordinator access required");return;}
    const s=await dbRead();
    const snapshot={id:Date.now(),startedAt:s?.drillStartedAt||Date.now(),endedAt:Date.now(),members:(s?.members||[]).map(m=>({...m})),summary:{safe:(s?.members||[]).filter(m=>m.status==="safe").length,away:(s?.members||[]).filter(m=>m.status==="away").length,out:(s?.members||[]).filter(m=>m.status==="out").length,nothere:(s?.members||[]).filter(m=>m.status==="nothere").length,waiting:(s?.members||[]).filter(m=>m.status==="waiting").length,total:(s?.members||[]).length}};
    const history=[snapshot,...(s?.history||[])].slice(0,10);
    prevDrillRef.current=true;
    const next={...s,drillActive:false,drillStartedAt:null,history};
    setShared(next);await writeDb(next);playEnd();
    await blastAllClear(s?.phonebook||[]);
    closeModal();showToast("✅ Drill ended & saved to history!");
  };

  const pingMember=async(member)=>{
    if(!isCoord)return;
    playPing();const s=await dbRead();
    const pings={...(s?.pingedAt||{}),[member.name]:Date.now()};
    setShared(prev=>({...prev,pingedAt:pings}));await writeDb({...s,pingedAt:pings});
    if(member.phone&&twSid&&twToken&&twFrom) await sendOneSMS(fmtPhone(member.phone),"📣 "+member.name+", the coordinator needs your fire drill status!\n"+APP_URL+"?name="+encodeURIComponent(member.name)+"\n\n— FireCheck",creds());
    showToast("📣 Pinged "+member.name);
  };

  // ── LOADING ───────────────────────────────────────────────────────────
  if(shared===null) return React.createElement("div",{style:{minHeight:"100vh",background:"#090909",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Space Mono',monospace",color:"#333",fontSize:13}},"Loading FireCheck…");

  // ── LOCK SCREEN ───────────────────────────────────────────────────────
  const isFirstSetup=!shared.adminPinHash&&!shared.coordPinHash;
  if(accessLevel===ACCESS.NONE){
    // teammates arriving via SMS link bypass lock — they only see their status panel
    if(urlName&&!isFirstSetup) {
      // show simplified teammate view
    } else {
      return React.createElement(LockScreen,{shared,onUnlock:handleUnlock,isFirstSetup});
    }
  }

  const stats=(shared.members||[]).reduce((a,m)=>{a[m.status]=(a[m.status]||0)+1;return a;},{});
  const sorted=[...(shared.members||[])].sort((a,b)=>(SORT_ORDER[a.status]??4)-(SORT_ORDER[b.status]??4));
  const twilioReady=!!(twSid&&twToken&&twFrom);
  const h=React.createElement;

  // ── TEAMMATE VIEW (via SMS link) ──────────────────────────────────────
  if(accessLevel===ACCESS.NONE&&urlName){
    return h("div",{style:{minHeight:"100vh",background:"#090909",color:"#f0ede8",fontFamily:"'Syne',sans-serif",display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      shared.drillActive&&h("div",{className:"drill-banner",style:{position:"fixed",top:0,left:0,right:0}},"🔥 FIRE DRILL IN PROGRESS",h("span",{className:"drill-timer"},elapsed),"🔥"),
      h("div",{style:{width:"100%",maxWidth:480,marginTop:shared.drillActive?60:0}},

                    const next={...s,history:[]};
                    setShared(prev=>({...prev,history:[]}));
                    await dbWrite(next);
                    closeModal();
                    showToast("🗑️ Drill history cleared");
                  }},"Yes, Delete All History")
                )
              )
            : h("button",{className:"cbtn",style:{borderColor:"#ef4444",color:"#ef4444"},onClick:()=>setModal("clearHistoryConfirm")},
                "🗑️ Clear Drill History"+(( shared.history||[]).length>0?" ("+( shared.history||[]).length+" records)":"")
              )
        ),
        h("div",{className:"card"},
          h("div",{className:"lbl"},"// access levels"),
          h("p",{style:{fontSize:12,color:"#555",lineHeight:1.7}},"🔐 Admin PIN — manages phone book, settings, changes PINs"),
          h("p",{style:{fontSize:12,color:"#555",lineHeight:1.7,marginTop:6}},"🎛️ Coordinator PIN — starts and ends drills, pings teammates"),
          h("p",{style:{fontSize:12,color:"#555",lineHeight:1.7,marginTop:6}},"🔒 Everyone else — sees a lock screen when opening the app"),
          h("p",{style:{fontSize:12,color:"#22c55e",lineHeight:1.7,marginTop:6}},"✅ Teammates arriving via SMS link bypass the lock and see only their status panel")
        )
      )
    ),
    h("div",{className:"toast"+(toast?" show":"")},toast)
  );
}
