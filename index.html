<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// Uses JSONBin.io as a free shared database — no backend needed
// JSONBin free tier: 10,000 requests/month — more than enough for drills
const JSONBIN_URL = "https://api.jsonbin.io/v3/b";
const JSONBIN_KEY = "$2a$10$placeholder"; // will be replaced by user

// ── LOCAL STORAGE ─────────────────────────────────────────────────────────────
const LS = {
  get(k){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;} },
  set(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} }
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function initials(n){ return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2); }
function timeAgo(ts){
  const d=Math.floor((Date.now()-ts)/1000);
  if(d<10)return"just now";if(d<60)return d+"s ago";
  if(d<3600)return Math.floor(d/60)+"m ago";return Math.floor(d/3600)+"h ago";
}
function fmtPhone(raw){
  const d=raw.replace(/\D/g,"");
  if(d.length===10)return"+1"+d;
  if(d.length===11&&d[0]==="1")return"+"+d;
  if(d.startsWith("+"))return raw;
  return"+"+d;
}
function hashPin(pin){
  let h=0;for(let i=0;i<pin.length;i++)h=(Math.imul(31,h)+pin.charCodeAt(i))|0;return h.toString(36);
}

const STATUS_META={
  safe:   {label:"Safe & Outside", icon:"✅",color:"#22c55e",bg:"rgba(34,197,94,0.12)",  border:"rgba(34,197,94,0.3)"},
  away:   {label:"Evacuating Now", icon:"🏃",color:"#f59e0b",bg:"rgba(245,158,11,0.12)", border:"rgba(245,158,11,0.3)"},
  out:    {label:"Not at Work",    icon:"🏠",color:"#3b82f6",bg:"rgba(59,130,246,0.12)", border:"rgba(59,130,246,0.3)"},
  nothere:{label:"Unknown",        icon:"❓",color:"#9ca3af",bg:"rgba(107,114,128,0.12)",border:"rgba(107,114,128,0.3)"},
  waiting:{label:"No Response Yet",icon:"⏳",color:"#4b5563",bg:"rgba(75,85,99,0.08)",  border:"rgba(75,85,99,0.2)"},
};
const SORT_ORDER={safe:0,away:1,out:2,nothere:3,waiting:4};

// ── JSONBIN SHARED DB ─────────────────────────────────────────────────────────
async function dbRead(binId, apiKey){
  try{
    const r=await fetch(`${JSONBIN_URL}/${binId}/latest`,{
      headers:{"X-Master-Key":apiKey}
    });
    if(!r.ok) return null;
    const j=await r.json();
    return j.record;
  }catch(e){return null;}
}

async function dbWrite(binId, apiKey, data){
  try{
    const r=await fetch(`${JSONBIN_URL}/${binId}`,{
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":apiKey},
      body:JSON.stringify(data)
    });
    return r.ok;
  }catch(e){return false;}
}

async function dbCreate(apiKey){
  try{
    const r=await fetch(JSONBIN_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":apiKey,"X-Bin-Name":"firecheck","X-Bin-Private":"false"},
      body:JSON.stringify({members:[],drillActive:false,drillStartedAt:null,pingedAt:{},pinHash:null,updatedAt:Date.now()})
    });
    if(!r.ok) return null;
    const j=await r.json();
    return j.metadata.id;
  }catch(e){return null;}
}

// ── TWILIO SMS ────────────────────────────────────────────────────────────────
async function sendSMS(toNumbers,message,creds){
  const {accountSid,authToken,fromNumber}=creds;
  return Promise.allSettled(toNumbers.map(to=>
    fetch(`https://api.twilio.com/2010-04-01/Accounts/${accountSid}/Messages.json`,{
      method:"POST",
      headers:{"Authorization":"Basic "+btoa(accountSid+":"+authToken),"Content-Type":"application/x-www-form-urlencoded"},
      body:new URLSearchParams({To:to,From:fromNumber,Body:message}).toString(),
    }).then(r=>r.json())
  ));
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==="suspended")audioCtx.resume();return audioCtx;}
function playAlarm(){try{const c=getCtx();[0,0.55,1.1].forEach(off=>{[0,0.08,0.16].forEach(t=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=t===0.08?1200:880;o.type="square";g.gain.setValueAtTime(0,c.currentTime+off+t);g.gain.linearRampToValueAtTime(0.18,c.currentTime+off+t+0.01);g.gain.linearRampToValueAtTime(0,c.currentTime+off+t+0.07);o.start(c.currentTime+off+t);o.stop(c.currentTime+off+t+0.1);});})}catch(e){}}
function playPing(){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=1400;o.type="sine";g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.12,c.currentTime+0.01);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);o.start(c.currentTime);o.stop(c.currentTime+0.5);}catch(e){}}
function playEnd(){try{const c=getCtx();[0,0.15,0.3].forEach((t,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=[523,659,784][i];o.type="sine";g.gain.setValueAtTime(0,c.currentTime+t);g.gain.linearRampToValueAtTime(0.12,c.currentTime+t+0.02);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.3);o.start(c.currentTime+t);o.stop(c.currentTime+t+0.35);});}catch(e){}}

// ── COMPONENTS ────────────────────────────────────────────────────────────────
const {useState,useEffect,useRef,useCallback}=React;

function Avatar({name,color,bg,size=40}){
  return React.createElement("div",{style:{width:size,height:size,borderRadius:"50%",background:bg,color,border:"2px solid "+color,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:size*0.34,flexShrink:0,fontFamily:"'Space Mono',monospace"}},initials(name));
}

function SetupPanel({onSave}){
  const [apiKey,setApiKey]=useState(()=>LS.get("fc:jsonbin_key")||"");
  const [binId,setBinId]=useState(()=>LS.get("fc:jsonbin_bin")||"");
  const [status,setStatus]=useState("");
  const [creating,setCreating]=useState(false);

  const createBin=async()=>{
    if(!apiKey.trim()){setStatus("❌ Please enter your JSONBin API key first");return;}
    setCreating(true);setStatus("Creating shared database…");
    const id=await dbCreate(apiKey.trim());
    if(id){setBinId(id);setStatus("✅ Database created! Bin ID: "+id);}
    else setStatus("❌ Failed — check your API key");
    setCreating(false);
  };

  const save=()=>{
    if(!apiKey.trim()||!binId.trim()){setStatus("❌ Both fields required");return;}
    LS.set("fc:jsonbin_key",apiKey.trim());
    LS.set("fc:jsonbin_bin",binId.trim());
    onSave(apiKey.trim(),binId.trim());
  };

  return React.createElement("div",{style:{minHeight:"100vh",background:"#090909",display:"flex",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Syne',sans-serif"}},
    React.createElement("div",{style:{background:"#131313",border:"1px solid #222",borderRadius:20,padding:36,maxWidth:500,width:"100%"}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:8}},
        React.createElement("span",{style:{fontSize:28}},"🔥"),
        React.createElement("h1",{style:{fontSize:24,fontWeight:800,color:"#f0ede8"}},"Fire",React.createElement("span",{style:{color:"#ff4d2e"}},"Check"))
      ),
      React.createElement("p",{style:{fontSize:13,color:"#555",marginBottom:28,lineHeight:1.7}},"One-time setup needed to sync across all devices. Takes 2 minutes."),
      
      React.createElement("div",{style:{background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:12,padding:20,marginBottom:20}},
        React.createElement("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#ff4d2e",marginBottom:10,letterSpacing:"0.1em"}},"STEP 1 — GET A FREE JSONBIN KEY"),
        React.createElement("p",{style:{fontSize:12,color:"#555",lineHeight:1.7,marginBottom:10}},"1. Go to ",React.createElement("a",{href:"https://jsonbin.io",target:"_blank",style:{color:"#3b82f6"}},"jsonbin.io")," → Sign up free",React.createElement("br"),
        "2. Go to API Keys → Create a new key",React.createElement("br"),
        "3. Copy the key and paste it below"),
        React.createElement("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#444",marginBottom:6,letterSpacing:"0.1em"}},"YOUR JSONBIN API KEY"),
        React.createElement("input",{style:{width:"100%",background:"#1a1a1a",border:"1.5px solid #222",borderRadius:10,padding:"10px 14px",color:"#f0ede8",fontFamily:"'Space Mono',monospace",fontSize:12,outline:"none"},placeholder:"$2a$10$...",value:apiKey,onChange:e=>setApiKey(e.target.value)})
      ),

      React.createElement("div",{style:{background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:12,padding:20,marginBottom:20}},
        React.createElement("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:11,color:"#ff4d2e",marginBottom:10,letterSpacing:"0.1em"}},"STEP 2 — CREATE YOUR TEAM DATABASE"),
        React.createElement("p",{style:{fontSize:12,color:"#555",lineHeight:1.7,marginBottom:12}},"Click the button below to create a shared database for your team. Do this only once."),
        React.createElement("button",{onClick:createBin,disabled:creating,style:{background:"#ff4d2e",border:"none",borderRadius:10,padding:"10px 20px",color:"#fff",fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",opacity:creating?0.6:1}},creating?"Creating…":"🗄️ Create Team Database"),
        binId&&React.createElement("div",{style:{marginTop:12}},
          React.createElement("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#444",marginBottom:6,letterSpacing:"0.1em"}},"BIN ID (auto-filled)"),
          React.createElement("input",{style:{width:"100%",background:"#1a1a1a",border:"1.5px solid #222",borderRadius:10,padding:"10px 14px",color:"#f0ede8",fontFamily:"'Space Mono',monospace",fontSize:12,outline:"none"},value:binId,onChange:e=>setBinId(e.target.value)})
        )
      ),

      status&&React.createElement("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:12,color:status.startsWith("❌")?"#ef4444":"#22c55e",marginBottom:16,padding:"10px 14px",background:"rgba(0,0,0,0.3)",borderRadius:8}},status),

      React.createElement("button",{onClick:save,style:{width:"100%",background:"#22c55e",border:"none",borderRadius:10,padding:"12px 20px",color:"#fff",fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:800,cursor:"pointer"}},"✅ Save & Launch App"),

      React.createElement("div",{style:{marginTop:16,padding:"12px 14px",background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:10,fontSize:11,color:"#3b82f6",lineHeight:1.6}},"💡 Share your Bin ID with your team so they can connect to the same database. Or just share the app link — if they use the same Bin ID they'll all sync automatically.")
    )
  );
}

function App(){
  const [dbReady,setDbReady]=useState(false);
  const [apiKey,setApiKey]=useState(()=>LS.get("fc:jsonbin_key")||"");
  const [binId,setBinId]=useState(()=>LS.get("fc:jsonbin_bin")||"");

  const [shared,setShared]=useState({members:[],drillActive:false,drillStartedAt:null,pingedAt:{},pinHash:null});
  const [me,setMe]=useState(()=>LS.get("fc:me"));
  const [nameInput,setNameInput]=useState("");
  const [roleInput,setRoleInput]=useState("");
  const [phoneInput,setPhoneInput]=useState("");
  const [noteInput,setNoteInput]=useState("");
  const [isCoord,setIsCoord]=useState(false);
  const [showSetPin,setShowSetPin]=useState(false);
  const [showUnlock,setShowUnlock]=useState(false);
  const [newPin,setNewPin]=useState("");
  const [confirmPin,setConfirmPin]=useState("");
  const [pinInput,setPinInput]=useState("");
  const [pinError,setPinError]=useState("");
  const [showConfig,setShowConfig]=useState(false);
  const [twSid,setTwSid]=useState(()=>{const c=LS.get("fc:twilio");return c?.accountSid||"";});
  const [twToken,setTwToken]=useState(()=>{const c=LS.get("fc:twilio");return c?.authToken||"";});
  const [twFrom,setTwFrom]=useState(()=>{const c=LS.get("fc:twilio");return c?.fromNumber||"";});
  const [smsLog,setSmsLog]=useState([]);
  const [sendingCount,setSendingCount]=useState(0);
  const [alertFlash,setAlertFlash]=useState(false);
  const [elapsed,setElapsed]=useState("00:00");
  const [toast,setToast]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [,forceRender]=useState(0);
  const prevDrillRef=useRef(false);
  const toastRef=useRef(null);
  const writingRef=useRef(false);

  useEffect(()=>{
    if(apiKey&&binId) setDbReady(true);
  },[apiKey,binId]);

  const showToast=useCallback((msg)=>{
    setToast(msg);clearTimeout(toastRef.current);
    toastRef.current=setTimeout(()=>setToast(null),3200);
  },[]);

  // ── DB READ/WRITE ──────────────────────────────────────────────────────
  const readDb=useCallback(async()=>{
    if(!apiKey||!binId) return null;
    return await dbRead(binId,apiKey);
  },[apiKey,binId]);

  const writeDb=useCallback(async(data)=>{
    if(!apiKey||!binId||writingRef.current) return;
    writingRef.current=true;
    await dbWrite(binId,apiKey,{...data,updatedAt:Date.now()});
    writingRef.current=false;
  },[apiKey,binId]);

  // ── POLL ──────────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!dbReady) return;
    const poll=async()=>{
      setSyncing(true);
      const s=await readDb();
      setSyncing(false);
      if(!s) return;
      const wasActive=prevDrillRef.current;
      const isNow=s.drillActive;
      if(!wasActive&&isNow){setAlertFlash(true);playAlarm();setTimeout(()=>setAlertFlash(false),3000);}
      if(wasActive&&!isNow) playEnd();
      prevDrillRef.current=isNow;
      setShared(s);
    };
    poll();
    const id=setInterval(poll,4000);
    const tk=setInterval(()=>forceRender(n=>n+1),15000);
    return()=>{clearInterval(id);clearInterval(tk);};
  },[dbReady,readDb]);

  // ── TIMER ─────────────────────────────────────────────────────────────
  useEffect(()=>{
    if(!shared.drillActive||!shared.drillStartedAt){setElapsed("00:00");return;}
    const t=setInterval(()=>{
      const s=Math.floor((Date.now()-shared.drillStartedAt)/1000);
      setElapsed(String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"));
    },1000);
    return()=>clearInterval(t);
  },[shared.drillActive,shared.drillStartedAt]);

  // ── JOIN ──────────────────────────────────────────────────────────────
  const join=async()=>{
    const name=nameInput.trim();
    if(!name){showToast("Please enter your name");return;}
    const user={name,role:roleInput.trim()||"Team Member",phone:phoneInput.trim(),status:"waiting",note:"",ts:Date.now()};
    setMe(user);LS.set("fc:me",user);
    const s=await readDb();
    const cur=(s?.members||[]);
    const idx=cur.findIndex(m=>m.name===name);
    if(idx>=0)cur[idx]=user;else cur.unshift(user);
    const next={...s,members:cur};
    setShared(next);
    await writeDb(next);
    showToast("Welcome, "+name+"! 👋");
  };

  // ── STATUS ────────────────────────────────────────────────────────────
  const setStatus=useCallback(async(status)=>{
    if(!me)return;
    const updated={...me,status,ts:Date.now()};
    setMe(updated);LS.set("fc:me",updated);
    const s=await readDb();
    const cur=(s?.members||[]).map(m=>m.name===me.name?updated:m);
    const next={...s,members:cur};
    setShared(next);await writeDb(next);
    showToast(STATUS_META[status].icon+" "+STATUS_META[status].label);
  },[me,readDb,writeDb,showToast]);

  const sendNote=useCallback(async()=>{
    if(!me)return;
    const updated={...me,note:noteInput.trim(),ts:Date.now()};
    setMe(updated);LS.set("fc:me",updated);
    const s=await readDb();
    const cur=(s?.members||[]).map(m=>m.name===me.name?updated:m);
    const next={...s,members:cur};
    setShared(next);await writeDb(next);
    showToast("📝 Note sent");
  },[me,noteInput,readDb,writeDb,showToast]);

  // ── PIN ───────────────────────────────────────────────────────────────
  const handleSetPin=async()=>{
    if(newPin.length<4){setPinError("PIN must be at least 4 digits");return;}
    if(newPin!==confirmPin){setPinError("PINs don't match");return;}
    const hash=hashPin(newPin);
    const s=await readDb();
    const next={...s,pinHash:hash};
    setShared(next);await writeDb(next);
    setIsCoord(true);setShowSetPin(false);setNewPin("");setConfirmPin("");setPinError("");
    showToast("🔐 PIN set! You are now the coordinator.");
  };
  const handleUnlock=()=>{
    if(hashPin(pinInput)===shared.pinHash){
      setIsCoord(true);setShowUnlock(false);setPinInput("");setPinError("");
      showToast("🔓 Coordinator access granted");
    }else{setPinError("Incorrect PIN");setPinInput("");}
  };

  // ── SMS ───────────────────────────────────────────────────────────────
  const blastSMS=useCallback(async(message,targets)=>{
    if(!twSid||!twToken||!twFrom)return;
    const withPhone=targets.filter(m=>m.phone);
    if(!withPhone.length){showToast("⚠️ No teammates have phone numbers yet");return;}
    setSendingCount(withPhone.length);
    const results=await sendSMS(withPhone.map(m=>fmtPhone(m.phone)),message,{accountSid:twSid,authToken:twToken,fromNumber:fmtPhone(twFrom)});
    setSendingCount(0);
    const log=withPhone.map((m,i)=>({ts:Date.now(),name:m.name,to:fmtPhone(m.phone),status:results[i].status==="fulfilled"&&!results[i].value?.error_code?"sent":"failed",error:results[i].value?.message||""}));
    setSmsLog(prev=>[...log,...prev].slice(0,50));
    const sent=log.filter(l=>l.status==="sent").length;
    const fail=log.filter(l=>l.status==="failed").length;
    showToast("📱 SMS: "+sent+" sent"+(fail?", "+fail+" failed":""));
  },[twSid,twToken,twFrom,showToast]);

  // ── DRILL ─────────────────────────────────────────────────────────────
  const startDrill=async()=>{
    const now=Date.now();
    const s=await readDb();
    const cur=(s?.members||[]).map(m=>m.name===me?.name?m:{...m,status:"waiting",note:"",ts:now});
    prevDrillRef.current=false;
    const next={...s,members:cur,drillActive:true,drillStartedAt:now,pingedAt:{}};
    setShared(next);await writeDb(next);
    setAlertFlash(true);playAlarm();setTimeout(()=>setAlertFlash(false),3000);
    const others=cur.filter(m=>m.name!==me?.name);
    await blastSMS("🔥 FIRE DRILL STARTED\nReport your status NOW:\nhttps://mesutgmail.github.io/firecheck\n\n— FireCheck",others);
    showToast("🔔 Drill started!");
  };

  const endDrill=async()=>{
    const s=await readDb();
    prevDrillRef.current=true;
    const next={...s,drillActive:false,drillStartedAt:null};
    setShared(next);await writeDb(next);
    playEnd();
    const others=(s?.members||[]).filter(m=>m.name!==me?.name);
    await blastSMS("✅ Fire drill ended. All clear! — FireCheck",others);
    showToast("✅ Drill ended — all-clear SMS sent!");
  };

  const clearAll=async()=>{
    const next={members:[],drillActive:false,drillStartedAt:null,pingedAt:{},pinHash:null,updatedAt:Date.now()};
    setShared(next);setMe(null);LS.set("fc:me",null);
    await writeDb(next);setIsCoord(false);
    showToast("🗑️ Board cleared");
  };

  const pingMember=async(member)=>{
    playPing();
    const s=await readDb();
    const pings={...(s?.pingedAt||{}),[member.name]:Date.now()};
    const next={...s,pingedAt:pings};
    setShared(next);await writeDb(next);
    if(member.phone) await blastSMS("📣 "+member.name+", the coordinator needs your fire drill status!\nhttps://mesutgmail.github.io/firecheck\n\n— FireCheck",[member]);
    showToast("📣 Pinged "+member.name);
  };

  // ── SETUP SCREEN ──────────────────────────────────────────────────────
  if(!dbReady){
    return React.createElement(SetupPanel,{onSave:(k,b)=>{setApiKey(k);setBinId(b);setDbReady(true);}});
  }

  const stats=(shared.members||[]).reduce((a,m)=>{a[m.status]=(a[m.status]||0)+1;return a;},{});
  const sorted=[...(shared.members||[])].sort((a,b)=>(SORT_ORDER[a.status]??4)-(SORT_ORDER[b.status]??4));
  const twilioReady=!!(twSid&&twToken&&twFrom);
  const pinIsSet=!!shared.pinHash;
  const h=React.createElement;

  return h("div",{className:"root"},
    alertFlash&&h("div",{className:"flash"}),
    shared.drillActive&&h("div",{className:"drill-banner"},
      h("span",null,"🔥"),"FIRE DRILL IN PROGRESS — REPORT YOUR STATUS NOW",
      h("span",{className:"drill-timer"},elapsed),h("span",null,"🔥")
    ),

    // SET PIN MODAL
    showSetPin&&h("div",{className:"overlay",onClick:e=>e.target===e.currentTarget&&setShowSetPin(false)},
      h("div",{className:"modal"},
        h("button",{className:"modal-close",onClick:()=>setShowSetPin(false)},"×"),
        h("h2",null,"🔐 Set Coordinator PIN"),
        h("p",null,"Choose a PIN only you know. Required to start or end drills."),
        h("div",{className:"cfg-lbl",style:{marginBottom:6}},"CHOOSE A PIN (min 4 digits)"),
        h("input",{className:"pin-input",type:"password",inputMode:"numeric",maxLength:8,placeholder:"••••",value:newPin,onChange:e=>setNewPin(e.target.value.replace(/\D/g,"")),onKeyDown:e=>e.key==="Enter"&&document.getElementById("cp2").focus()}),
        h("div",{className:"cfg-lbl",style:{margin:"12px 0 6px"}},"CONFIRM PIN"),

.log-name{font-weight:600;flex:1}.log-num{color:#333;font-family:'Space Mono',monospace}.log-time{color:#2a2a2a;font-family:'Space Mono',monospace;font-size:9px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e1e;border:1px solid #2a2a2a;border-radius:12px;padding:11px 20px;font-size:13px;font-weight:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9998;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
